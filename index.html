<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official Student & Faculty Portal Login for K.L.N. College of Engineering. Access academic resources.">
    <title>K.L.N. College of Engineering | Portal Login</title>
    <!-- Google Fonts: Outfit for Headings, Inter for Body Text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- External stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <!-- Premium Ambient Background Glows -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
        <div class="bg-glow bg-glow-3"></div>

        <!-- Central Login Card -->
        <main class="login-card">
            <!-- Header Section with Logo -->
            <header class="card-header">
                <div class="logo-wrapper">
                    <img src="assets/logo.png" alt="K.L.N. College of Engineering Logo" class="college-logo" id="collegeLogo">
                </div>
                <h1 class="college-title">K.L.N. COLLEGE OF ENGINEERING</h1>
                <p class="college-subtitle">Autonomous Institution | Estd. 1994</p>
                <div class="portal-badge">STUDENT & FACULTY PORTAL</div>
            </header>

            <!-- Login Form -->
            <form id="loginForm" class="login-form" novalidate>
                <!-- Global error message container -->
                <div id="formErrorMessage" class="form-error-message hidden" role="alert">
                    <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <span id="errorMessageText">Invalid Credentials</span>
                </div>

                <!-- Username/Email Field -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" id="username" class="input-field" placeholder=" " required autocomplete="username">
                        <label for="username" class="input-label">Roll Number / Email Address</label>
                        <div class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                    </div>
                    <span class="field-error" id="usernameError"></span>
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="password" id="password" class="input-field" placeholder=" " required autocomplete="current-password">
                        <label for="password" class="input-label">Password</label>
                        <div class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <button type="button" id="passwordToggle" class="password-toggle" aria-label="Toggle password visibility">
                            <!-- Eye icon -->
                            <svg id="eyeIcon" class="toggle-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <!-- Eye slash icon (hidden initially) -->
                            <svg id="eyeOffIcon" class="toggle-icon hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.025 10.025 0 014.132-5.4M9.9 4.24a9.12 9.12 0 011.66-.24c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-2.24 4.053m-3.153-1.222A3 3 0 0012 10v2M12 9h.01" />
                            </svg>
                        </button>
                    </div>
                    <span class="field-error" id="passwordError"></span>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <label class="remember-me-label" for="rememberMe">
                        <input type="checkbox" id="rememberMe" class="remember-me-checkbox">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">Keep me logged in</span>
                    </label>
                    <a href="#" class="forgot-link" id="forgotPassword">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="submit-btn">
                    <span class="btn-text" id="btnText">Sign In</span>
                    <span class="btn-spinner hidden" id="btnSpinner"></span>
                </button>
            </form>

            <!-- Card Footer -->
            <footer class="card-footer">
                <p class="assistance-text">Need assistance? <a href="#" class="support-link">Contact IT Support</a></p>
                <div class="divider"></div>
                <p class="copyright">&copy; 2026 K.L.N. College of Engineering. All rights reserved.</p>
            </footer>
        </main>
    </div>

    <!-- Success Toast Notification -->
    <div id="successToast" class="toast hidden" role="status" aria-live="polite">
        <div class="toast-content">
            <div class="toast-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <div class="toast-text">
                <h4 class="toast-title">Login Successful</h4>
                <p class="toast-desc">Redirecting to your student dashboard...</p>
            </div>
        </div>
        <div class="toast-progress"></div>
    </div>

    <!-- Script File -->
    <script src="app.js"></script>
</body>
</html>
